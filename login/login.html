<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantaOne Log-in</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
<div id="loginbox">
<div id="MantaText">
    <span id="manta">Manta</span><span id="one">One</span>
</div>
<div id="loginform">
            <h2>Login</h2> 
<br>
<br> 
        <label for= "username" id="usertext">Username: </label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
            <p id="usermsg"></p>
    <br>
    <br>
        <label for= "password" id="passtext">Password: </label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <p id="passmsg"></p>
    <br>
    <br>
        <button id="loginbtn" href="homepage/index.html">Login</button>
</div>
</div>
<script src="login.js"></script>
</body>
</html>
